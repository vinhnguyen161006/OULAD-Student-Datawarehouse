name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Lint Python (DAGs + scripts)
  # ============================================================
  python-lint:
    name: Python lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff==0.6.9

      - name: Ruff check
        run: ruff check dags scripts

  # ============================================================
  # dbt parse + compile (offline — không cần DB)
  # ============================================================
  dbt-validate:
    name: dbt parse + compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt-mysql
        run: |
          pip install --upgrade pip
          pip install dbt-mysql==1.7.0 mysqlclient==2.2.4

      - name: dbt parse
        env:
          DBT_HOST: dummy
          DBT_USER: dummy
          DBT_PASSWORD: dummy
        run: |
          dbt parse \
            --project-dir dbt_student \
            --profiles-dir dbt_student

  # ============================================================
  # dbt build + test (integration — chạy thật trên MySQL service)
  # ============================================================
  dbt-build-test:
    name: dbt build + test (MySQL)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: student_dwh
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt-mysql + client
        run: |
          pip install --upgrade pip
          pip install dbt-mysql==1.7.0 mysqlclient==2.2.4
          sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Wait for MySQL ready
        run: |
          for i in {1..30}; do
            mysql -h 127.0.0.1 -P 3306 -uroot -prootpassword -e "SELECT 1" && break
            sleep 2
          done

      - name: Init DWH schema + seed minimum fixture
        run: |
          mysql -h 127.0.0.1 -P 3306 -uroot -prootpassword < docker/mysql/init.sql
          mysql -h 127.0.0.1 -P 3306 -uroot -prootpassword student_dwh <<'SQL'
            INSERT INTO Dim_Course VALUES ('AAA','2013J',268);
            INSERT INTO Dim_Student VALUES (1,'M','East','HE Qualification','0-10%','35-55','N',0,60);
            INSERT INTO Dim_Assessment VALUES (1001,'AAA','2013J','TMA',10.0,30);
            INSERT INTO Fact_Performance (id_student,code_module,code_presentation,id_assessment,score,total_clicks,final_result,score_vs_avg,risk_group)
              VALUES (1,'AAA','2013J',1001,75.0,420,'Pass',5.0,'Low');
            INSERT INTO Fact_Performance (id_student,code_module,code_presentation,id_assessment,score,total_clicks,final_result,score_vs_avg,risk_group)
              VALUES (1,'AAA','2013J',1001,40.0,80,'Fail',-30.0,'High');
          SQL

      - name: dbt build (run + test)
        env:
          DBT_HOST: 127.0.0.1
          DBT_PORT: "3306"
          DBT_USER: root
          DBT_PASSWORD: rootpassword
        run: |
          dbt deps --project-dir dbt_student --profiles-dir dbt_student
          dbt build \
            --project-dir dbt_student \
            --profiles-dir dbt_student

  # ============================================================
  # Airflow DAG validation (import + cycle check)
  # ============================================================
  airflow-dags:
    name: Airflow DAG validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Airflow
        run: |
          pip install --upgrade pip
          pip install "apache-airflow==2.9.2" \
            "apache-airflow-providers-apache-spark==4.9.0" \
            "apache-airflow-providers-mysql==5.6.1" \
            --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.9.2/constraints-3.11.txt"

      - name: Import all DAGs (catch syntax + cycle errors)
        run: |
          export AIRFLOW_HOME=$PWD/.airflow
          mkdir -p $AIRFLOW_HOME
          airflow db migrate
          AIRFLOW__CORE__DAGS_FOLDER=$PWD/dags airflow dags list
          # Fail if any DAG has import errors
          AIRFLOW__CORE__DAGS_FOLDER=$PWD/dags airflow dags list-import-errors > /tmp/errors.txt
          if [ -s /tmp/errors.txt ] && grep -q . /tmp/errors.txt; then
            echo "DAG import errors found:"
            cat /tmp/errors.txt
            exit 1
          fi
